    <link rel="stylesheet" href="estilos.css">
</head>

<body>
    <h1>Tacoschidos 🌮</h1>
    <form id="Form" class="buttons">
        <button type="button" data-type="Puerco">🐷</button>
        <button type="button" data-type="Cerdo">🍊</button>
        <button type="button" data-type="Pavo">🦚</button>
        <button type="button" data-type="Pescado">🐟</button>
    </form>

    <div id="Container"></div>

    <script>
        const recetaJSON = `
  {

          },
          "salsa": {
            "nombre": "Salsa de habanero",
            "picor": "muy picante"
          },
          "acompañamientos": [
            { "nombre": "Cebolla morada encurtida", "cantidad": "2 cucharadas" },
            { "nombre": "Cilantro", "cantidad": "al gusto" },
            { "nombre": "Tortilla de maíz", "cantidad": "2 piezas" }
          ]
        }
      },
      {
        "nombre": "Taco de Poc Chuk",
        "tipo": "poc chuk",
        "ingredientes": {
          "proteina": {
            "nombre": "Cerdo asado",
            "preparacion": "Marinado en naranja agria y especias yucatecas, asado a la plancha"
          },
          "salsa": {
            "nombre": "Salsa de tomate asado",
            "picor": "medio"
          },
          "acompañamientos": [
            { "nombre": "Frijoles colados", "cantidad": "3 cucharadas" },
            { "nombre": "Cebolla asada", "cantidad": "al gusto" },
            { "nombre": "Tortilla de maíz", "cantidad": "2 piezas" }
          ]
        }
      },
      {
        "nombre": "Taco de Relleno Negro",
        "tipo": "relleno negro",
        "ingredientes": {
          "proteina": {
            "nombre": "Pavo en chilmole",
            "preparacion": "Cocido en pasta de chile quemado con especias yucatecas"
          },
          "salsa": {
            "nombre": "Chilmole negro",
            "picor": "moderado"
          },
          "acompañamientos": [
            { "nombre": "Huevo cocido", "cantidad": "1 pieza" },
            { "nombre": "Tortilla de maíz", "cantidad": "2 piezas" },
            { "nombre": "Cebolla blanca", "cantidad": "al gusto" }
          ]
        }
      },
      {
        "nombre": "Taco de Pescado",
        "tipo": "pescado",
        "ingredientes": {
          "proteina": {
            "nombre": "Filete de tilapia",
            "preparacion": "Empanizado y frito en aceite caliente"
          },
          "salsa": {
            "nombre": "Salsa verde",
            "picor": "suave"
          },
          "acompañamientos": [
            { "nombre": "Repollo rallado", "cantidad": "2 cucharadas" },
            { "nombre": "Crema", "cantidad": "1 cucharada" },
            { "nombre": "Limón", "cantidad": "1 pieza" },
            { "nombre": "Tortilla de maíz", "cantidad": "2 piezas" }
          ]
        }
      }
    ]
  }
  `;
        const recetasTacos = JSON.parse(recetaJSON);

        document.querySelectorAll("#Form button").forEach(button => {
            button.addEventListener("click", async (event) => {
                const type = event.target.getAttribute("data-type").toLowerCase();


                const response = await fetch(`/receta/${type}`);
                const receta = await response.json();


                const contenedor = document.getElementById("Container");
                if (receta.error) {
                    contenedor.innerHTML = "<h2>Receta no encontrada</h2>"; //si no se recupera el contenido HTML de un elemento.
                } else {
                    contenedor.innerHTML = `
            <h2>${receta.nombre}</h2> 
            <h3>Ingredientes:</h3>
            <ul id="ingredientesLista">
              <li>Carne de: ${receta.ingredientes.proteina.nombre}, Modo preparación: ${receta.ingredientes.proteina.preparacion}</li>
              <li> Salsa: ${receta.ingredientes.salsa.nombre} (${receta.ingredientes.salsa.picor})</li>
              ${receta.ingredientes.acompañamientos.map(acompañamiento => `<li> Acompañamiento: ${acompañamiento.cantidad} : ${acompañamiento.nombre}</li>`).join("")}</ul>`;
                }
            });
        });
    </script>

</body>

</html>
