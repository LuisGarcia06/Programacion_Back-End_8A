<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cielo — Clima en tiempo real</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>
  <div class="noise"></div>

  <div class="container">

    <header class="header">
      <div class="logo">
        <span class="logo-icon">◎</span>
        <span class="logo-text">cielo</span>
      </div>
      <p class="tagline">Clima en cualquier rincón del mundo</p>
    </header>

    <div class="search-section">
      <div class="search-box">
        <span class="search-icon">⌕</span>
        <input
          type="text"
          id="city-input"
          placeholder="Ciudad, país o región..."
          autocomplete="off"
        />
        <button id="search-btn" onclick="buscarClima()">
          <span>Buscar</span>
          <span class="btn-arrow">→</span>
        </button>
      </div>
      <div id="error-msg" class="error-msg hidden">
        <span class="error-icon">!</span>
        <span id="error-text"></span>
      </div>
    </div>

    <div id="empty-state" class="empty-state">
      <div class="empty-icon">🌤</div>
      <p>Busca una ciudad para ver el clima</p>
    </div>

    <div id="loading" class="loading hidden">
      <div class="loader-ring"></div>
      <span>Consultando el cielo...</span>
    </div>

    <div id="weather-result" class="weather-result hidden">

      <div class="main-card">
        <div class="card-top">
          <div class="location-info">
            <h2 id="city-name" class="city-name"></h2>
            <p id="city-region" class="city-region"></p>
          </div>
          <div class="local-time-wrap">
            <span id="local-time" class="local-time"></span>
            <span id="local-date" class="local-date"></span>
          </div>
        </div>

        <div class="card-middle">
          <div class="temp-block">
            <span id="temp-value" class="temp-value"></span>
            <span class="temp-unit">°C</span>
          </div>
          <div class="condition-block">
            <img id="weather-icon" class="weather-icon" src="" alt="" />
            <span id="condition-text" class="condition-text"></span>
            <span id="feels-like" class="feels-like"></span>
          </div>
        </div>

        <div class="divider"></div>

        <div class="stats-grid">
          <div class="stat">
            <span class="stat-icon">💧</span>
            <div class="stat-info">
              <span class="stat-label">Humedad</span>
              <span id="stat-humidity" class="stat-value"></span>
            </div>
          </div>
          <div class="stat">
            <span class="stat-icon">🌬</span>
            <div class="stat-info">
              <span class="stat-label">Viento</span>
              <span id="stat-wind" class="stat-value"></span>
            </div>
          </div>
          <div class="stat">
            <span class="stat-icon">👁</span>
            <div class="stat-info">
              <span class="stat-label">Visibilidad</span>
              <span id="stat-vis" class="stat-value"></span>
            </div>
          </div>
          <div class="stat">
            <span class="stat-icon">☀️</span>
            <div class="stat-info">
              <span class="stat-label">Índice UV</span>
              <span id="stat-uv" class="stat-value"></span>
            </div>
          </div>
          <div class="stat">
            <span class="stat-icon">🌡</span>
            <div class="stat-info">
              <span class="stat-label">Presión</span>
              <span id="stat-pressure" class="stat-value"></span>
            </div>
          </div>
          <div class="stat">
            <span class="stat-icon">🧭</span>
            <div class="stat-info">
              <span class="stat-label">Dir. viento</span>
              <span id="stat-wind-dir" class="stat-value"></span>
            </div>
          </div>
        </div>
      </div>

      <div class="forecast-section">
        <h3 class="forecast-title">Próximos días</h3>
        <div id="forecast-row" class="forecast-row"></div>
      </div>

    </div>
  </div>

  <script src="clima.js"></script>
</body>
</html>
